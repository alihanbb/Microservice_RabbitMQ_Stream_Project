version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"      # AMQP
      - "5552:5552"      # Stream
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    command: >
      bash -c "rabbitmq-plugins enable rabbitmq_stream && rabbitmq-server"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5
      
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    ports:
      - "10000:10000"  # Blob
      - "10001:10001"  # Queue
      - "10002:10002"  # Table
    volumes:
      - azurite_data:/data
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 -l /data"
    networks:
      - microservices-network
      
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    hostname: sqlserver
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -C -Q 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      
  sqlserver-backup:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-backup
    hostname: sqlserver-backup
    ports:
      - "1434:1433"
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver_backup_data:/var/opt/mssql
      - sqlserver_backup_files:/var/opt/mssql/backup
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -C -Q 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    hostname: redis-master
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass "RedisPass123"
    volumes:
      - redis_master_data:/data
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "RedisPass123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  redis-slave:
    image: redis:7-alpine
    container_name: redis-slave
    hostname: redis-slave
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --requirepass "RedisPass123" --masterauth "RedisPass123" --replicaof redis-master 6379
    volumes:
      - redis_slave_data:/data
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "RedisPass123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-sentinel:
    image: redis:7-alpine
    container_name: redis-sentinel
    hostname: redis-sentinel
    ports:
      - "26379:26379"
    command: >
      sh -c "mkdir -p /etc/redis &&
             echo 'port 26379' > /etc/redis/sentinel.conf &&
             echo 'sentinel monitor mymaster redis-master 6379 1' >> /etc/redis/sentinel.conf &&
             echo 'sentinel auth-pass mymaster RedisPass123' >> /etc/redis/sentinel.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> /etc/redis/sentinel.conf &&
             echo 'sentinel failover-timeout mymaster 60000' >> /etc/redis/sentinel.conf &&
             echo 'sentinel parallel-syncs mymaster 1' >> /etc/redis/sentinel.conf &&
             redis-sentinel /etc/redis/sentinel.conf"
    depends_on:
      redis-master:
        condition: service_healthy
      redis-slave:
        condition: service_healthy
    networks:
      - microservices-network

  # ============================================
  # PostgreSQL - Primary
  # ============================================
  postgresql:
    image: postgres:16-alpine
    container_name: postgresql
    hostname: postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: PostgresPass123
      POSTGRES_DB: maindb
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # PostgreSQL - Backup Instance
  # ============================================
  postgresql-backup:
    image: postgres:16-alpine
    container_name: postgresql-backup
    hostname: postgresql-backup
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: PostgresPass123
      POSTGRES_DB: backupdb
    volumes:
      - postgresql_backup_data:/var/lib/postgresql/data
      - postgresql_backup_files:/var/lib/postgresql/backup
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
  azurite_data:
  sqlserver_data:
  sqlserver_backup_data:
  sqlserver_backup_files:
  redis_master_data:
  redis_slave_data:
  postgresql_data:
  postgresql_backup_data:
  postgresql_backup_files:

networks:
  microservices-network:
    driver: bridge
