version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"      # AMQP
      - "5552:5552"      # Stream
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    command: >
      bash -c "rabbitmq-plugins enable rabbitmq_stream rabbitmq_stream_management && rabbitmq-server"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5
      

      
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    hostname: sqlserver
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD}' -C -Q 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    hostname: redis-master
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_master_data:/data
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  redis-slave:
    image: redis:7-alpine
    container_name: redis-slave
    hostname: redis-slave
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD} --replicaof redis-master 6379
    volumes:
      - redis_slave_data:/data
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-sentinel:
    image: redis:7-alpine
    container_name: redis-sentinel
    hostname: redis-sentinel
    ports:
      - "26379:26379"
    command: >
      sh -c "mkdir -p /etc/redis &&
             echo 'port 26379' > /etc/redis/sentinel.conf &&
             echo 'sentinel resolve-hostnames yes' >> /etc/redis/sentinel.conf &&
             echo 'sentinel monitor mymaster redis-master 6379 1' >> /etc/redis/sentinel.conf &&
             echo 'sentinel auth-pass mymaster ${REDIS_PASSWORD}' >> /etc/redis/sentinel.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> /etc/redis/sentinel.conf &&
             echo 'sentinel failover-timeout mymaster 60000' >> /etc/redis/sentinel.conf &&
             echo 'sentinel parallel-syncs mymaster 1' >> /etc/redis/sentinel.conf &&
             redis-sentinel /etc/redis/sentinel.conf"
    depends_on:
      redis-master:
        condition: service_healthy
      redis-slave:
        condition: service_healthy
    networks:
      - microservices-network

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    hostname: redis-insight
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/data
    networks:
      - microservices-network

volumes:
  rabbitmq_data:

  sqlserver_data:
  redis_master_data:
  redis_slave_data:
  redis_insight_data:

networks:
  microservices-network:
    driver: bridge
