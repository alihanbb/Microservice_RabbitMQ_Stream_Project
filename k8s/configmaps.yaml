apiVersion: v1
kind: ConfigMap
metadata:
  name: shopping-cart-config
  namespace: microservices
data:
  appsettings.Production.json: |
    {
      "Logging": {
        "LogLevel": { "Default": "Information", "Microsoft.AspNetCore": "Warning" }
      },
      "ConnectionStrings": {
        "Redis": "redis-master:6379,password=$(REDIS_PASSWORD),abortConnect=false"
      },
      "RabbitMQ": {
        "Host": "rabbitmq",
        "Port": 5552,
        "Username": "$(RABBITMQ_USER)",
        "Password": "$(RABBITMQ_PASS)",
        "StreamName": "shopping-cart-events",
        "Partitions": 3
      },
      "Observability": {
        "OtlpEndpoint": "http://otel-collector.monitoring:4317"
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: discount-config
  namespace: microservices
data:
  appsettings.Production.json: |
    {
      "Logging": {
        "LogLevel": { "Default": "Information", "Microsoft.AspNetCore": "Warning" }
      },
      "ConnectionStrings": {
        "SqlConnection": "Server=sqlserver,1433;Database=DiscountDb;User Id=sa;Password=$(SA_PASSWORD);TrustServerCertificate=True"
      },
      "RabbitMQ": {
        "Host": "rabbitmq",
        "Port": 5552,
        "Username": "$(RABBITMQ_USER)",
        "Password": "$(RABBITMQ_PASS)",
        "StreamName": "shopping-cart-events",
        "Partitions": 3
      },
      "Observability": {
        "OtlpEndpoint": "http://otel-collector.monitoring:4317"
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-config
  namespace: microservices
data:
  appsettings.Production.json: |
    {
      "Logging": {
        "LogLevel": { "Default": "Information" }
      },
      "RabbitMQ": {
        "Host": "rabbitmq",
        "Port": 5552,
        "Username": "$(RABBITMQ_USER)",
        "Password": "$(RABBITMQ_PASS)",
        "VirtualHost": "/",
        "SuperStreamName": "shopping-cart-events",
        "Partitions": 3
      },
      "Observability": {
        "OtlpEndpoint": "http://otel-collector.monitoring:4317"
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: microservices
data:
  appsettings.Production.json: |
    {
      "Logging": {
        "LogLevel": { "Default": "Information", "Microsoft.AspNetCore": "Warning" }
      },
      "ReverseProxy": {
        "Routes": {
          "cart-route": {
            "ClusterId": "shopping-cart-cluster",
            "Match": { "Path": "/api/carts/{**catch-all}" }
          },
          "discount-route": {
            "ClusterId": "discount-cluster",
            "Match": { "Path": "/api/discounts/{**catch-all}" }
          }
        },
        "Clusters": {
          "shopping-cart-cluster": {
            "Destinations": {
              "destination1": { "Address": "http://shopping-cart:8080/" }
            }
          },
          "discount-cluster": {
            "Destinations": {
              "destination1": { "Address": "http://discount:8080/" }
            }
          }
        }
      },
      "Observability": {
        "OtlpEndpoint": "http://otel-collector.monitoring:4317"
      }
    }
